services:
  bioragent:
    container_name: bioragent
    image: bioragent:local
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      ELASTICSEARCH_HOST: ${ELASTICSEARCH_HOST}
      ELASTICSEARCH_USER: ${ELASTICSEARCH_USER}
      ELASTICSEARCH_PASSWORD: ${ELASTICSEARCH_PASSWORD}
    ports:
      - "127.0.0.1:7865:7860"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:7860/', timeout=5)"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
